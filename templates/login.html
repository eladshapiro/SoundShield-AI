<!DOCTYPE html>
<html x-data="loginState()" :lang="lang" :dir="dir" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="t('loginTitle')">SoundShield-AI Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 50: '#EFF6FF', 100: '#DBEAFE', 200: '#BFDBFE', 300: '#93C5FD', 400: '#60A5FA', 500: '#3B82F6', 600: '#2563EB', 700: '#1D4ED8', 800: '#1E40AF', 900: '#1E3A8A' }
          }
        }
      }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 font-sans min-h-screen flex items-center justify-center transition-colors duration-300">

    <div class="w-full max-w-md px-6">
        <!-- Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 space-y-6">

            <!-- Logo + Title -->
            <div class="text-center">
                <div class="mx-auto w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center mb-4">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">SoundShield-AI</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" x-text="t('loginSubtitle')">Kindergarten Audio Analysis</p>
            </div>

            <!-- Error alert -->
            <div x-show="error" x-transition
                 class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-3 flex items-center gap-2">
                <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <span class="text-sm text-red-700 dark:text-red-300" x-text="error"></span>
            </div>

            <!-- Login form -->
            <form @submit.prevent="login()" class="space-y-4">
                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="t('username')">Username</label>
                    <input x-model="username" type="text" required autocomplete="username"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                           :placeholder="t('usernamePlaceholder')">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="t('password')">Password</label>
                    <div class="relative">
                        <input x-model="password" :type="showPassword ? 'text' : 'password'" required autocomplete="current-password"
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                               :placeholder="t('passwordPlaceholder')">
                        <button type="button" @click="showPassword = !showPassword"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                            <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg x-show="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember me + language toggle -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input x-model="rememberMe" type="checkbox" class="w-4 h-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                        <span class="text-sm text-gray-600 dark:text-gray-400" x-text="t('rememberMe')">Remember me</span>
                    </label>
                    <button type="button" @click="toggleLang()" class="text-sm text-primary-600 hover:text-primary-700 font-medium">
                        <span x-text="lang === 'en' ? 'HE' : 'EN'"></span>
                    </button>
                </div>

                <!-- Submit -->
                <button type="submit" :disabled="loading"
                        class="w-full py-2.5 px-4 bg-primary-600 hover:bg-primary-700 disabled:bg-primary-400 text-white font-medium rounded-lg transition-colors flex items-center justify-center gap-2">
                    <svg x-show="loading" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    <span x-text="loading ? t('loggingIn') : t('loginBtn')">Sign In</span>
                </button>
            </form>

            <!-- Default credentials hint (dev only) -->
            <div class="text-center">
                <p class="text-xs text-gray-400 dark:text-gray-500" x-text="t('defaultCredentials')"></p>
            </div>
        </div>

        <!-- Dark mode toggle -->
        <div class="mt-4 text-center">
            <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)"
                    class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
                <span x-text="darkMode ? '&#9728; Light Mode' : '&#9790; Dark Mode'"></span>
            </button>
        </div>
    </div>

    <script>
    function loginState() {
        return {
            // State
            username: '',
            password: '',
            showPassword: false,
            rememberMe: true,
            loading: false,
            error: '',
            lang: localStorage.getItem('lang') || 'en',
            dir: (localStorage.getItem('lang') || 'en') === 'he' ? 'rtl' : 'ltr',
            darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches,

            // Translations
            _t: {
                loginTitle:         { en: 'Sign In - SoundShield-AI', he: '\u05DB\u05E0\u05D9\u05E1\u05D4 - SoundShield-AI' },
                loginSubtitle:      { en: 'Kindergarten Audio Analysis', he: '\u05E0\u05D9\u05EA\u05D5\u05D7 \u05E9\u05DE\u05E2 \u05D2\u05DF \u05D9\u05DC\u05D3\u05D9\u05DD' },
                username:           { en: 'Username', he: '\u05E9\u05DD \u05DE\u05E9\u05EA\u05DE\u05E9' },
                usernamePlaceholder:{ en: 'Enter your username', he: '\u05D4\u05D6\u05DF \u05E9\u05DD \u05DE\u05E9\u05EA\u05DE\u05E9' },
                password:           { en: 'Password', he: '\u05E1\u05D9\u05E1\u05DE\u05D4' },
                passwordPlaceholder:{ en: 'Enter your password', he: '\u05D4\u05D6\u05DF \u05E1\u05D9\u05E1\u05DE\u05D4' },
                rememberMe:         { en: 'Remember me', he: '\u05D6\u05DB\u05D5\u05E8 \u05D0\u05D5\u05EA\u05D9' },
                loginBtn:           { en: 'Sign In', he: '\u05DB\u05E0\u05D9\u05E1\u05D4' },
                loggingIn:          { en: 'Signing in...', he: '\u05DE\u05EA\u05D7\u05D1\u05E8...' },
                invalidCredentials: { en: 'Invalid username or password', he: '\u05E9\u05DD \u05DE\u05E9\u05EA\u05DE\u05E9 \u05D0\u05D5 \u05E1\u05D9\u05E1\u05DE\u05D4 \u05E9\u05D2\u05D5\u05D9\u05D9\u05DD' },
                networkError:       { en: 'Network error. Please try again.', he: '\u05E9\u05D2\u05D9\u05D0\u05EA \u05E8\u05E9\u05EA. \u05E0\u05E1\u05D4 \u05E9\u05D5\u05D1.' },
                defaultCredentials: { en: 'Default: admin / admin (change in production)', he: '\u05D1\u05E8\u05D9\u05E8\u05EA \u05DE\u05D7\u05D3\u05DC: admin / admin' },
            },

            t(key) { return (this._t[key] || {})[this.lang] || key; },

            toggleLang() {
                this.lang = this.lang === 'en' ? 'he' : 'en';
                this.dir = this.lang === 'he' ? 'rtl' : 'ltr';
                localStorage.setItem('lang', this.lang);
            },

            async login() {
                this.error = '';
                this.loading = true;

                try {
                    const res = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: this.username,
                            password: this.password
                        })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        this.error = data.error || this.t('invalidCredentials');
                        this.loading = false;
                        return;
                    }

                    // Store token and user info
                    const storage = this.rememberMe ? localStorage : sessionStorage;
                    storage.setItem('token', data.token);
                    storage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect to dashboard
                    window.location.href = '/';

                } catch (e) {
                    this.error = this.t('networkError');
                    this.loading = false;
                }
            },

            init() {
                // If already logged in, redirect
                const token = localStorage.getItem('token');
                if (token) {
                    window.location.href = '/';
                }
            }
        };
    }
    </script>
</body>
</html>
