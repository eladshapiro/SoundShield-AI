<!DOCTYPE html>
<html x-data="appState()" :lang="lang" :dir="dir" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="t('pageTitle')">SoundShield-AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 50: '#EFF6FF', 100: '#DBEAFE', 200: '#BFDBFE', 300: '#93C5FD', 400: '#60A5FA', 500: '#3B82F6', 600: '#2563EB', 700: '#1D4ED8', 800: '#1E40AF', 900: '#1E3A8A' },
            severity: { low: '#22C55E', medium: '#EAB308', high: '#F97316', critical: '#EF4444' }
          }
        }
      }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-[#F8FAFC] dark:bg-[#0F172A] font-sans text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

    <!-- Skip to content -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[100] focus:bg-primary-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-md" x-text="t('skipToContent')">
        Skip to main content
    </a>

    <!-- ===== TOP NAVIGATION BAR ===== -->
    <nav class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-sm">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo / Title -->
                <div class="flex items-center gap-3">
                    <div class="flex-shrink-0 w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
                        <!-- Shield icon -->
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-900 dark:text-white">SoundShield-AI</h1>
                        <p class="text-xs text-gray-500 dark:text-gray-400" x-text="t('subtitle')"></p>
                    </div>
                </div>

                <!-- Right controls -->
                <div class="flex items-center gap-2">
                    <!-- Sidebar toggle (mobile) -->
                    <button
                        @click="sidebarOpen = !sidebarOpen"
                        class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 min-w-[44px] min-h-[44px] flex items-center justify-center"
                        :aria-label="t('toggleSidebar')"
                    >
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>

                    <!-- Language toggle -->
                    <button
                        x-on:click="toggleLang()"
                        class="px-3 py-2 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
                        :aria-label="t('toggleLanguage')"
                    >
                        <svg class="w-4 h-4 me-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                        </svg>
                        <span x-text="lang === 'en' ? 'HE' : 'EN'"></span>
                    </button>

                    <!-- Dark mode toggle -->
                    <button
                        x-on:click="darkMode = !darkMode"
                        class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"
                        :aria-label="t('toggleDarkMode')"
                    >
                        <!-- Sun icon (shown in dark mode) -->
                        <svg x-show="darkMode" class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/>
                        </svg>
                        <!-- Moon icon (shown in light mode) -->
                        <svg x-show="!darkMode" class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN LAYOUT ===== -->
    <div class="max-w-screen-2xl mx-auto flex flex-col lg:flex-row min-h-[calc(100vh-4rem)]">

        <!-- ===== LEFT SIDEBAR ===== -->
        <!-- Mobile backdrop -->
        <div
            x-show="sidebarOpen"
            x-transition:enter="transition-opacity ease-linear duration-300"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity ease-linear duration-300"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="fixed inset-0 z-30 bg-black/50 lg:hidden"
            @click="sidebarOpen = false"
        ></div>

        <aside
            :class="sidebarOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'"
            class="fixed bottom-0 left-0 right-0 z-40 max-h-[80vh] overflow-y-auto rounded-t-2xl lg:rounded-none
                   lg:static lg:max-h-none lg:z-auto lg:w-80 lg:flex-shrink-0
                   bg-white dark:bg-gray-900 border-t lg:border-t-0 lg:border-e border-gray-200 dark:border-gray-700
                   transform transition-transform duration-300 ease-in-out"
        >
            <div class="p-4 lg:p-6 space-y-6 lg:sticky lg:top-16 lg:max-h-[calc(100vh-4rem)] lg:overflow-y-auto">

                <!-- Mobile drag handle -->
                <div class="flex justify-center lg:hidden">
                    <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
                </div>

                <!-- Upload Zone -->
                <div x-data="uploadManager()">
                    <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3" x-text="t('uploadTitle')"></h2>

                    <div
                        class="relative border-2 border-dashed rounded-xl p-6 text-center transition-all duration-200 cursor-pointer"
                        :class="dragOver
                            ? 'border-primary-500 bg-primary-50 dark:bg-primary-900/20'
                            : 'border-gray-300 dark:border-gray-600 hover:border-primary-400 hover:bg-gray-50 dark:hover:bg-gray-800'"
                        @click="$refs.fileInput.click()"
                        @dragover.prevent="dragOver = true"
                        @dragleave.prevent="dragOver = false"
                        @drop.prevent="handleDrop($event)"
                        :aria-label="t('uploadDropzone')"
                    >
                        <input
                            type="file"
                            x-ref="fileInput"
                            class="hidden"
                            accept=".wav,.mp3,.m4a,.flac,.aac,.ogg"
                            @change="handleFileSelect($event)"
                        >

                        <!-- Upload icon -->
                        <div class="mx-auto w-12 h-12 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center mb-3">
                            <svg class="w-6 h-6 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                            </svg>
                        </div>

                        <p class="text-sm font-medium text-gray-700 dark:text-gray-300" x-text="t('uploadDragDrop')"></p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">WAV, MP3, M4A, FLAC, AAC, OGG</p>

                        <!-- Selected file display -->
                        <template x-if="selectedFile">
                            <div class="mt-3 p-2 bg-primary-50 dark:bg-primary-900/20 rounded-lg text-sm" @click.stop>
                                <div class="flex items-center gap-2 text-primary-700 dark:text-primary-300">
                                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                                    </svg>
                                    <span class="truncate" x-text="selectedFile.name"></span>
                                </div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1" x-text="formatFileSize(selectedFile.size)"></p>
                            </div>
                        </template>
                    </div>

                    <!-- Analysis language selector -->
                    <div class="mt-3">
                        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1" x-text="t('analysisLanguage')"></label>
                        <select
                            x-model="analysisLang"
                            class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm px-3 py-2 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none min-h-[44px]"
                            :aria-label="t('analysisLanguage')"
                        >
                            <option value="he">Hebrew</option>
                            <option value="en">English</option>
                        </select>
                    </div>

                    <!-- Upload / Cancel buttons -->
                    <div class="mt-3 flex gap-2">
                        <button
                            @click="uploadFile()"
                            :disabled="!selectedFile || uploading"
                            class="flex-1 bg-primary-600 hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors min-h-[44px] flex items-center justify-center gap-2"
                            :aria-label="t('uploadButton')"
                        >
                            <svg x-show="!uploading" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                            </svg>
                            <svg x-show="uploading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span x-text="uploading ? t('analyzing') : t('uploadButton')"></span>
                        </button>
                        <button
                            x-show="selectedFile && !uploading"
                            @click="clearFile()"
                            class="px-3 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm transition-colors min-h-[44px]"
                            :aria-label="t('cancelButton')"
                        >
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Divider -->
                <hr class="border-gray-200 dark:border-gray-700">

                <!-- Analysis History -->
                <div x-data="{ historyLoaded: false }" x-init="$nextTick(() => { loadHistory(); historyLoaded = true })">
                    <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3 flex items-center justify-between">
                        <span x-text="t('historyTitle')"></span>
                        <button
                            @click="loadHistory()"
                            class="p-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors min-w-[36px] min-h-[36px] flex items-center justify-center"
                            :aria-label="t('refreshHistory')"
                        >
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                        </button>
                    </h2>

                    <div class="space-y-2 max-h-[40vh] lg:max-h-[50vh] overflow-y-auto" id="historyList">
                        <!-- Empty history message -->
                        <template x-if="history.length === 0">
                            <p class="text-sm text-gray-400 dark:text-gray-500 text-center py-4" x-text="t('noHistory')"></p>
                        </template>

                        <!-- History items -->
                        <template x-for="(report, idx) in history" :key="report.filename">
                            <button
                                @click="viewReport(report.filename); sidebarOpen = false"
                                class="w-full text-start p-3 rounded-lg bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors group min-h-[44px]"
                                :aria-label="t('viewReport') + ': ' + report.original_file"
                            >
                                <div class="flex items-start justify-between gap-2">
                                    <div class="min-w-0 flex-1">
                                        <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" x-text="report.original_file"></p>
                                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5" x-text="formatDate(report.date)"></p>
                                    </div>
                                    <span
                                        class="flex-shrink-0 text-xs font-semibold px-2 py-0.5 rounded-full"
                                        :class="severityBadgeClass(report.summary?.risk_level)"
                                        x-text="report.summary?.risk_level || '---'"
                                    ></span>
                                </div>
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT AREA ===== -->
        <main id="main-content" class="flex-1 overflow-y-auto">
            <div class="p-4 sm:p-6 lg:p-8 space-y-6">

                <!-- ===== EMPTY STATE (no analysis loaded) ===== -->
                <template x-if="!currentResults && !analyzing">
                    <div class="flex flex-col items-center justify-center py-16 lg:py-24">
                        <div class="w-20 h-20 bg-primary-100 dark:bg-primary-900/30 rounded-2xl flex items-center justify-center mb-6">
                            <svg class="w-10 h-10 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                            </svg>
                        </div>
                        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2" x-text="t('emptyTitle')"></h2>
                        <p class="text-gray-500 dark:text-gray-400 text-center max-w-md mb-8" x-text="t('emptyMessage')"></p>

                        <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark:border-gray-700 max-w-lg w-full">
                            <h3 class="text-sm font-semibold text-gray-900 dark:text-white mb-4" x-text="t('gettingStarted')"></h3>
                            <ol class="space-y-3">
                                <li class="flex items-start gap-3">
                                    <span class="flex-shrink-0 w-6 h-6 bg-primary-100 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                                    <span class="text-sm text-gray-600 dark:text-gray-400" x-text="t('step1Desc')"></span>
                                </li>
                                <li class="flex items-start gap-3">
                                    <span class="flex-shrink-0 w-6 h-6 bg-primary-100 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                                    <span class="text-sm text-gray-600 dark:text-gray-400" x-text="t('step2Desc')"></span>
                                </li>
                                <li class="flex items-start gap-3">
                                    <span class="flex-shrink-0 w-6 h-6 bg-primary-100 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 rounded-full flex items-center justify-center text-xs font-bold">3</span>
                                    <span class="text-sm text-gray-600 dark:text-gray-400" x-text="t('step3Desc')"></span>
                                </li>
                            </ol>
                        </div>
                    </div>
                </template>

                <!-- ===== RESULTS SECTION (shown when analysis results exist) ===== -->
                <template x-if="currentResults && !analyzing">
                    <div class="space-y-6">

                        <!-- Summary Metric Cards -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
                            <!-- Risk Level -->
                            <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-gray-500 dark:text-gray-400" x-text="t('riskLevel')"></span>
                                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                                    </svg>
                                </div>
                                <span
                                    class="inline-block text-lg font-bold px-3 py-1 rounded-full"
                                    :class="severityBadgeClass(currentResults.summary?.risk_level)"
                                    x-text="currentResults.summary?.risk_level || '---'"
                                ></span>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 line-clamp-2" x-text="currentResults.summary?.overall_assessment"></p>
                            </div>

                            <!-- Total Incidents -->
                            <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-gray-500 dark:text-gray-400" x-text="t('totalIncidents')"></span>
                                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                    </svg>
                                </div>
                                <p class="text-3xl font-bold text-gray-900 dark:text-white" x-text="currentResults.summary?.total_incidents ?? 0"></p>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2" x-text="t('detectedEvents')"></p>
                            </div>

                            <!-- Critical Incidents -->
                            <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-gray-500 dark:text-gray-400" x-text="t('criticalIncidents')"></span>
                                    <svg class="w-5 h-5 text-severity-critical" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                </div>
                                <p class="text-3xl font-bold" :class="(currentResults.summary?.critical_incidents ?? 0) > 0 ? 'text-severity-critical' : 'text-gray-900 dark:text-white'" x-text="currentResults.summary?.critical_incidents ?? 0"></p>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2" x-text="t('requireAttention')"></p>
                            </div>

                            <!-- Recording Duration -->
                            <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-gray-500 dark:text-gray-400" x-text="t('recordingDuration')"></span>
                                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                </div>

            <!-- Progress bar -->

                    <span x-text="t('step') + ' ' + progressStep + ' / ' + progressTotal"></span>
                    <span x-text="progressPercent + '%'"></span>
                </div>
                <div
                    class="w-full h-2.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"
                    role="progressbar"
                    :aria-valuenow="progressPercent"
                    aria-valuemin="0"
                    :aria-valuemax="100"
                    :aria-label="t('analysisProgress')"
                >
                    <div class="h-full bg-primary-600 rounded-full transition-all duration-500 ease-out" :style="'width: ' + progressPercent + '%'"></div>
                </div>
            </div>

            <!-- Step indicators -->
            <div class="space-y-1.5">
                <template x-for="step in progressSteps" :key="step.num">
                    <div class="flex items-center gap-3 p-2 rounded-lg text-sm transition-all" :class="{
                        'bg-green-50 dark:bg-green-900/20': step.num < progressStep,
                        'bg-primary-50 dark:bg-primary-900/20': step.num === progressStep,
                        '': step.num > progressStep
                    }">
                        <!-- Step number circle -->
                        <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 text-xs font-bold" :class="{
                            'bg-green-500 text-white': step.num < progressStep,
                            'bg-primary-600 text-white': step.num === progressStep,
                            'bg-gray-200 dark:bg-gray-700 text-gray-500 dark:text-gray-400': step.num > progressStep
                        }">
                            <!-- Checkmark for completed -->
                            <template x-if="step.num < progressStep">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            </template>
                            <template x-if="step.num >= progressStep">
                                <span x-text="step.num"></span>
                            </template>
                        </div>
                        <span class="text-gray-700 dark:text-gray-300" :class="{ 'font-medium': step.num === progressStep }" x-text="t(step.key)"></span>
                    </div>
                </template>
            </div>

            <!-- Cancel button -->
            <div class="text-center">
                <button
                    @click="cancelAnalysis()"
                    class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm transition-colors min-h-[44px]"
                    :aria-label="t('cancelButton')"
                    x-text="t('cancelButton')"
                ></button>
            </div>
        </div>

    /* ========================================
       Main Alpine.js App State
       ======================================== */
    function appState() {
        return {
            lang: 'en',
            dir: 'ltr',
            darkMode: false,
            sidebarOpen: false,
            currentResults: null,
            analyzing: false,
            history: [],
            toasts: [],
            toastId: 0,

            // Progress tracking
            progressStep: 0,
            progressTotal: 7,
            progressMessage: '',
            progressPercent: 0,
            progressInterval: null,
            progressSteps: [
                { num: 1, key: 'progressStep1' },
                { num: 2, key: 'progressStep2' },
                { num: 3, key: 'progressStep3' },
                { num: 4, key: 'progressStep4' },
                { num: 5, key: 'progressStep5' },
                { num: 6, key: 'progressStep6' },
                { num: 7, key: 'progressStep7' }
            ],

            init() {
                // Check saved preferences
                const savedDark = localStorage.getItem('ss-dark-mode');
                if (savedDark !== null) {
                    this.darkMode = savedDark === 'true';
                } else {
                    this.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
                }
                const savedLang = localStorage.getItem('ss-lang');
                if (savedLang) {
                    this.lang = savedLang;
                    this.dir = savedLang === 'he' ? 'rtl' : 'ltr';
                }

                this.$watch('darkMode', (val) => localStorage.setItem('ss-dark-mode', val));
                this.$watch('lang', (val) => localStorage.setItem('ss-lang', val));

                this.loadHistory();
            },

            t(key) {
                return translations[this.lang]?.[key] || translations['en'][key] || key;
            },

            toggleLang() {
                if (this.lang === 'en') {
                    this.lang = 'he';
                    this.dir = 'rtl';
                } else {
                    this.lang = 'en';
                    this.dir = 'ltr';
                }
            },

            severityBadgeClass(level) {
                if (!level) return 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300';
                const l = level.toLowerCase();
                if (l === 'low' || l === 'minimal') return 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300';
                if (l === 'medium' || l === 'moderate') return 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300';
                if (l === 'high') return 'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-300';
                if (l === 'critical' || l === 'severe') return 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300';
                return 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300';
            },

            formatDate(dateStr) {
                if (!dateStr) return '';
                try {
                    const d = new Date(dateStr);
                    return d.toLocaleDateString(this.lang === 'he' ? 'he-IL' : 'en-US', {
                        year: 'numeric', month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch {
                    return dateStr;
                }
            },

            formatDuration(minutes) {
                if (minutes == null) return '0.0';
                return Number(minutes).toFixed(1);
            },

            showToast(message, type = 'info') {
                const id = ++this.toastId;
                this.toasts.push({ id, message, type, visible: true });
                setTimeout(() => {
                    const toast = this.toasts.find(t => t.id === id);
                    if (toast) toast.visible = false;
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 300);
                }, 5000);
            },

            loadHistory() {
                fetch('/reports')
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            this.history = data.reports || [];
                        }
                    })
                    .catch(() => {});
            },

            viewReport(filename) {
                fetch('/report/' + filename)
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            this.$dispatch('open-modal', { report: data.report, filename: filename });
                        }
                    })
                    .catch(() => {
                        this.showToast(this.t('analysisError'), 'error');
                    });
            },

            startProgressPolling() {
                this.progressStep = 0;
                this.progressPercent = 0;
                this.progressMessage = '';
                this.analyzing = true;

                this.progressInterval = setInterval(() => {
                    fetch('/progress')
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === 'analyzing' || data.status === 'initializing' || data.status === 'completed') {
                                this.progressStep = data.step || 0;
                                this.progressTotal = data.total_steps || 7;
                                this.progressMessage = data.message || '';
                                this.progressPercent = Math.min(Math.round((this.progressStep / this.progressTotal) * 100), 100);
                            }
                            if (data.status === 'completed') {
                                this.stopProgressPolling();
                            }
                        })
                        .catch(() => {});
                }, 400);
            },

            stopProgressPolling() {
                if (this.progressInterval) {
                    clearInterval(this.progressInterval);
                    this.progressInterval = null;
                }
            },

            cancelAnalysis() {
                this.stopProgressPolling();
                this.analyzing = false;
            }
        };
    }

    /* ========================================
       Upload Manager
       ======================================== */
    function uploadManager() {
        return {
            selectedFile: null,
            uploading: false,
            dragOver: false,
            analysisLang: 'he',

            handleDrop(event) {
                this.dragOver = false;
                const files = event.dataTransfer.files;
                if (files.length > 0) {
                    this.selectedFile = files[0];
                }
            },

            handleFileSelect(event) {
                if (event.target.files.length > 0) {
                    this.selectedFile = event.target.files[0];
                }
            },

            clearFile() {
                this.selectedFile = null;
                this.$refs.fileInput.value = '';
            },

            formatFileSize(bytes) {
                if (!bytes) return '';
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            },

            uploadFile() {
                if (!this.selectedFile || this.uploading) return;
                this.uploading = true;

                const appData = Alpine.$data(document.querySelector('[x-data="appState()"]'));
                appData.startProgressPolling();

                const formData = new FormData();
                formData.append('file', this.selectedFile);
                formData.append('language', this.analysisLang);

                fetch('/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(r => r.json())
                .then(data => {
                    appData.stopProgressPolling();
                    appData.progressPercent = 100;

                    setTimeout(() => {
                        appData.analyzing = false;
                        this.uploading = false;

                        if (data.success) {
                            appData.currentResults = data.results;
                            appData.audioClips = data.audio_clips || [];
                            appData.currentFilename = data.filename || '';
                            appData.showToast(appData.t('analysisComplete'), 'success');
                            appData.loadHistory();

                            // Dispatch event for waveform and charts to pick up
                            window.dispatchEvent(new CustomEvent('analysis-complete', { detail: data }));
                        } else {
                            appData.showToast(appData.t('analysisError') + ': ' + (data.error || ''), 'error');
                        }

                        this.clearFile();
                    }, 800);
                })
                .catch(error => {
                    appData.stopProgressPolling();
                    appData.analyzing = false;
                    this.uploading = false;
                    appData.showToast(appData.t('uploadError') + ': ' + error.message, 'error');
                });
            }
        };
    }

    /* ========================================
       Waveform Manager
       ======================================== */
    function waveformManager() {
        return {
            wavesurfer: null,
            isPlaying: false,
            currentTime: '0:00',
            totalTime: '0:00',

            init() {
                window.addEventListener('analysis-complete', (e) => {
                    this.$nextTick(() => this.initWaveform(e.detail));
                });
            },

            initWaveform(data) {
                const container = document.getElementById('waveform-container');
                if (!container) return;

                // Destroy previous instance
                if (this.wavesurfer) {
                    this.wavesurfer.destroy();
                    this.wavesurfer = null;
                }

                // Check if we have an uploaded audio URL
                if (!data || !data.filename) return;

                const audioUrl = '/uploads/' + data.filename;

                try {
                    this.wavesurfer = WaveSurfer.create({
                        container: container,
                        waveColor: '#93C5FD',
                        progressColor: '#2563EB',
                        cursorColor: '#1D4ED8',
                        barWidth: 2,
                        barGap: 1,
                        barRadius: 2,
                        height: 128,
                        responsive: true,
                        url: audioUrl
                    });

                    this.wavesurfer.on('ready', () => {
                        this.totalTime = this.formatTime(this.wavesurfer.getDuration());
                    });

                    this.wavesurfer.on('audioprocess', () => {
                        this.currentTime = this.formatTime(this.wavesurfer.getCurrentTime());
                    });

                    this.wavesurfer.on('seeking', () => {
                        this.currentTime = this.formatTime(this.wavesurfer.getCurrentTime());
                    });

                    this.wavesurfer.on('play', () => { this.isPlaying = true; });
                    this.wavesurfer.on('pause', () => { this.isPlaying = false; });
                    this.wavesurfer.on('finish', () => { this.isPlaying = false; });
                } catch (err) {
                    console.warn('WaveSurfer init error:', err);
                }
            },

            formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            },

            playPause() {
                if (this.wavesurfer) {
                    this.wavesurfer.playPause();
                }
            },

            stop() {
                if (this.wavesurfer) {
                    this.wavesurfer.stop();
                    this.isPlaying = false;
                    this.currentTime = '0:00';
                }
            }
        };
    }

    /* ========================================
       Charts Manager
       ======================================== */
    function chartsManager() {
        return {
            charts: {},

            init() {
                window.addEventListener('analysis-complete', (e) => {
                    this.$nextTick(() => this.renderCharts(e.detail));
                });
            },

            renderCharts(data) {
                if (!data || !data.results) return;
                const results = data.results;
                const findings = results.detailed_findings || {};

                // Destroy existing charts
                Object.values(this.charts).forEach(c => { if (c) c.destroy(); });
                this.charts = {};

                const isDark = document.documentElement.classList.contains('dark');
                const textColor = isDark ? '#CBD5E1' : '#475569';
                const gridColor = isDark ? 'rgba(148,163,184,0.1)' : 'rgba(148,163,184,0.2)';

                // --- Severity Distribution (Doughnut) ---
                const severityCounts = { low: 0, medium: 0, high: 0, critical: 0 };
                const allFindings = [
                    ...(findings.emotional_analysis || []),
                    ...(findings.violence_analysis || []),
                    ...(findings.cry_analysis || []),
                    ...(findings.neglect_analysis || []),
                    ...(findings.language_analysis || [])
                ];
                allFindings.forEach(f => {
                    const sev = (f.severity || 'low').toLowerCase();
                    if (sev in severityCounts) severityCounts[sev]++;
                    else severityCounts['low']++;
                });

                const sevCtx = document.getElementById('chart-severity');
                if (sevCtx) {
                    this.charts.severity = new Chart(sevCtx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Low', 'Medium', 'High', 'Critical'],
                            datasets: [{
                                data: [severityCounts.low, severityCounts.medium, severityCounts.high, severityCounts.critical],
                                backgroundColor: ['#22C55E', '#EAB308', '#F97316', '#EF4444'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { position: 'bottom', labels: { color: textColor, padding: 12 } }
                            }
                        }
                    });
                }

                // --- Incident Types (Bar) ---
                const typeCounts = {
                    'Emotions': (findings.emotional_analysis || []).length,
                    'Violence': (findings.violence_analysis || []).length,
                    'Cries': (findings.cry_analysis || []).length,
                    'Neglect': (findings.neglect_analysis || []).length,
                    'Language': (findings.language_analysis || []).length
                };
                const typesCtx = document.getElementById('chart-types');
                if (typesCtx) {
                    this.charts.types = new Chart(typesCtx, {
                        type: 'bar',
                        data: {
                            labels: Object.keys(typeCounts),
                            datasets: [{
                                label: 'Count',
                                data: Object.values(typeCounts),
                                backgroundColor: ['#F97316', '#EF4444', '#3B82F6', '#6B7280', '#8B5CF6'],
                                borderRadius: 6,
                                borderSkipped: false
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, ticks: { stepSize: 1, color: textColor }, grid: { color: gridColor } },
                                x: { ticks: { color: textColor }, grid: { display: false } }
                            }
                        }
                    });
                }

                // --- Timeline Density (Line) ---
                const timelineCtx = document.getElementById('chart-timeline');
                if (timelineCtx) {
                    // Group incidents by time buckets
                    const duration = results.statistics?.audio_duration_minutes || 1;
                    const bucketCount = Math.min(Math.max(Math.ceil(duration), 5), 20);
                    const bucketSize = (duration * 60) / bucketCount;
                    const buckets = new Array(bucketCount).fill(0);

                    allFindings.forEach(f => {
                        if (f.timestamp) {
                            try {
                                const sec = parseFloat(f.timestamp.split(' ')[0].replace('s', ''));
                                const idx = Math.min(Math.floor(sec / bucketSize), bucketCount - 1);
                                if (idx >= 0) buckets[idx]++;
                            } catch (e) {}
                        }
                    });

                    const labels = buckets.map((_, i) => {
                        const sec = Math.round(i * bucketSize);
                        const m = Math.floor(sec / 60);
                        const s = sec % 60;
                        return m + ':' + (s < 10 ? '0' : '') + s;
                    });

                    this.charts.timeline = new Chart(timelineCtx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Incidents',
                                data: buckets,
                                borderColor: '#2563EB',
                                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 3,
                                pointBackgroundColor: '#2563EB'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, ticks: { stepSize: 1, color: textColor }, grid: { color: gridColor } },
                                x: { ticks: { color: textColor, maxRotation: 45 }, grid: { display: false } }
                            }
                        }
                    });
                }

                // --- Emotion Radar ---
                const emotionCtx = document.getElementById('chart-emotion');
                if (emotionCtx) {
                    const emotionMap = {};
                    (findings.emotional_analysis || []).forEach(e => {
                        const emo = e.detected_emotion || 'unknown';
                        emotionMap[emo] = (emotionMap[emo] || 0) + 1;
                    });
                    const emotionLabels = Object.keys(emotionMap);
                    const emotionData = Object.values(emotionMap);

                    if (emotionLabels.length > 0) {
                        this.charts.emotion = new Chart(emotionCtx, {
                            type: 'radar',
                            data: {
                                labels: emotionLabels,
                                datasets: [{
                                    label: 'Frequency',
                                    data: emotionData,
                                    backgroundColor: 'rgba(249, 115, 22, 0.2)',
                                    borderColor: '#F97316',
                                    pointBackgroundColor: '#F97316',
                                    borderWidth: 2
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                plugins: { legend: { display: false } },
                                scales: {
                                    r: {
                                        beginAtZero: true,
                                        ticks: { stepSize: 1, color: textColor, backdropColor: 'transparent' },
                                        grid: { color: gridColor },
                                        pointLabels: { color: textColor }
                                    }
                                }
                            }
                        });
                    } else {
                        // Show placeholder text
                        const ctx2d = emotionCtx.getContext('2d');
                        ctx2d.font = '14px Inter, sans-serif';
                        ctx2d.fillStyle = textColor;
                        ctx2d.textAlign = 'center';
                        ctx2d.fillText('No emotion data available', emotionCtx.width / 2, emotionCtx.height / 2);
                    }
                }
            }
        };
    }

    /* ========================================
       Modal Manager
       ======================================== */
    function modalManager() {
        return {
            modalOpen: false,
            reportData: null,
            reportFilename: null,

            openModal(detail) {
                this.reportData = detail.report;
                this.reportFilename = detail.filename;
                this.modalOpen = true;
                document.body.style.overflow = 'hidden';
            },

            closeModal() {
                this.modalOpen = false;
                this.reportData = null;
                this.reportFilename = null;
                document.body.style.overflow = '';
            }
        };
    }
